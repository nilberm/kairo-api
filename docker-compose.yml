# API + PostgreSQL para desenvolvimento local ou staging.
# Uso: cd kairo-api && docker-compose up -d
# A API sobe em http://localhost:4000 e usa o Postgres do compose.

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgres://kairo:kairo@postgres:5432/kairo
      JWT_SECRET: ${JWT_SECRET:-altere-em-producao}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kairo
      POSTGRES_PASSWORD: kairo
      POSTGRES_DB: kairo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kairo -d kairo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
